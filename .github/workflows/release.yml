name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: aperture-linux-x86_64
            tauri_target: x86_64-unknown-linux-gnu
          - os: macos-13
            artifact: aperture-macos-x86_64
            tauri_target: x86_64-apple-darwin
          - os: windows-2022
            artifact: aperture-windows-x86_64.exe
            tauri_target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.tauri_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Tauri binary
        run: npm run tauri build -- --target ${{ matrix.tauri_target }}

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          find src-tauri/target/${{ matrix.tauri_target }}/release \
            -maxdepth 1 -name 'aperture' -type f \
            -exec cp {} ${{ matrix.artifact }} \;

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "src-tauri\target\${{ matrix.tauri_target }}\release\aperture.exe"
          Copy-Item $src "${{ matrix.artifact }}"

      # ── Smoke test ─────────────────────────────────────────────────────────
      - name: Run smoke test
        run: |
          ./${{ matrix.artifact }} run ./examples/ci-smoke.mjs .
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md || echo "Release ${TAG}")
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            dist/aperture-linux-x86_64/aperture-linux-x86_64
            dist/aperture-macos-x86_64/aperture-macos-x86_64
            dist/aperture-windows-x86_64.exe/aperture-windows-x86_64.exe
