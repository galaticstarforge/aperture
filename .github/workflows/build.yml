name: Build Binaries

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.slug }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            slug: linux-x64
            exe: aperture
          - os: macos-13
            target: x86_64-apple-darwin
            slug: darwin-x64
            exe: aperture
          - os: macos-14
            target: aarch64-apple-darwin
            slug: darwin-arm64
            exe: aperture
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            slug: win32-x64
            exe: aperture.exe
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Tauri binary
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Stage bundle (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          stage="stage/aperture-${{ matrix.slug }}"
          mkdir -p "$stage"
          cp "src-tauri/target/${{ matrix.target }}/release/${{ matrix.exe }}" "$stage/aperture"
          chmod +x "$stage/aperture"
          cp -R runtime-shim "$stage/runtime-shim"
          tar -czf "aperture-${{ matrix.slug }}.tar.gz" -C stage "aperture-${{ matrix.slug }}"

      - name: Stage bundle (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          stage="stage/aperture-${{ matrix.slug }}"
          mkdir -p "$stage"
          cp "src-tauri/target/${{ matrix.target }}/release/${{ matrix.exe }}" "$stage/aperture.exe"
          cp -R runtime-shim "$stage/runtime-shim"
          tar -czf "aperture-${{ matrix.slug }}.tar.gz" -C stage "aperture-${{ matrix.slug }}"

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          tar -xzf "aperture-${{ matrix.slug }}.tar.gz" -C "$tmp"
          "$tmp/aperture-${{ matrix.slug }}/aperture" run ./examples/ci-smoke.mjs .

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          tar -xzf "aperture-${{ matrix.slug }}.tar.gz" -C "$tmp"
          "$tmp/aperture-${{ matrix.slug }}/aperture.exe" run ./examples/ci-smoke.mjs .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aperture-${{ matrix.slug }}
          path: aperture-${{ matrix.slug }}.tar.gz
          if-no-files-found: error

  publish-nightly:
    name: Publish nightly release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Delete previous nightly release + tag
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --cleanup-tag || true

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (${{ github.sha }})"
          prerelease: true
          body: |
            Rolling nightly build from `${{ github.ref_name }}` @ `${{ github.sha }}`.

            Artifacts contain the `aperture` binary alongside the `runtime-shim/`
            directory. Used by `@aperture/cli` to run scripts on any machine with
            Node.js installed.
          files: |
            dist/aperture-linux-x64.tar.gz
            dist/aperture-darwin-x64.tar.gz
            dist/aperture-darwin-arm64.tar.gz
            dist/aperture-win32-x64.tar.gz
